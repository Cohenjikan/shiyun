<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>诗云 · Poetry Cloud</title>
    <meta name="description" content="一张可漫游的三维星图：真实诗人是星团，星团之间的虚空是一切可能的诗。" />
    <meta name="theme-color" content="#07080f" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/favicon.png" />
    <!-- share preview (OG/Twitter). __OG_ORIGIN__ is replaced at build time from VITE_SITE_ORIGIN
         (vite.config.ts) — unset it falls back to a root-relative path, which most CN apps and
         Telegram resolve; set it before deploy so Facebook/X also get an absolute URL. -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="诗云 · Poetry Cloud" />
    <meta property="og:title" content="诗云 · Poetry Cloud — 一切可能的诗" />
    <meta property="og:description" content="可漫游的三维星图：32,657 位真实诗人是星团，星团之间的虚空是一切可能的诗。点击虚空，捞起其中一首。" />
    <meta property="og:image" content="__OG_ORIGIN__/og.jpg" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="诗云 · Poetry Cloud — 一切可能的诗" />
    <meta name="twitter:description" content="可漫游的三维星图：真实诗人是星团，虚空是一切可能的诗。" />
    <meta name="twitter:image" content="__OG_ORIGIN__/og.jpg" />
  </head>
  <body>
    <div id="root"></div>
    <script>
      // capability gate — plain ES5 on purpose: browsers too old for the app (no BigInt → the
      // ES2022 bundle won't even parse) still parse THIS and get a human message instead of a
      // black screen. Also catches WebGL-less environments (blocked GPU / remote desktop).
      (function () {
        var msg = null;
        if (typeof BigInt === "undefined") {
          msg = "你的浏览器过旧（缺少 BigInt），无法运行诗云的编号引擎。请换用较新的 Chrome / Edge / Safari / Firefox。";
        } else {
          try {
            var c = document.createElement("canvas");
            if (!c.getContext("webgl2") && !c.getContext("webgl")) {
              msg = "此设备或浏览器没有可用的 WebGL，无法渲染诗云星图。请换用支持 WebGL 的浏览器，或检查显卡/远程桌面设置。";
            }
          } catch (e) {
            msg = "此设备或浏览器没有可用的 WebGL，无法渲染诗云星图。";
          }
        }
        if (msg) {
          document.getElementById("root").innerHTML =
            '<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;background:#07080f;color:#d8c89a;font-family:serif;padding:24px;text-align:center">' +
            '<div style="font-size:34px;letter-spacing:.3em;margin-bottom:18px">诗云</div>' +
            '<div style="font-size:14px;line-height:1.8;max-width:30em;color:#b9c2d6">' + msg + "</div></div>";
        }
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
